<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkySplat++: Four-Method Comparison</title>

<link rel="stylesheet" href="static/css/bulma.min.css">
<style>
  .compare-column {
    position: relative;
    text-align: center;
    margin-bottom: 2rem;
  }
  .image-compare-container {
    position: relative;
    width: 100%;
    overflow: hidden;
  }
  .image-compare-container img {
    width: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  .img-layer {
    z-index: 1;
    clip-path: inset(0 0 0 0);
  }
  .slider-container {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .slider {
    width: 200px;
  }
</style>

<script>
  // value1/value2/value3: 0-100
  function slideFourLayer(sceneId) {
    const s1 = document.getElementById(sceneId + '_slider1').value;
    const s2 = document.getElementById(sceneId + '_slider2').value;
    const s3 = document.getElementById(sceneId + '_slider3').value;

    // HiSplat
    document.getElementById(sceneId + '_HiSplat').style.clipPath = `inset(0 ${100 - s1}% 0 0)`;
    // SkySplat
    document.getElementById(sceneId + '_SkySplat').style.clipPath = `inset(0 ${100 - s2}% 0 0)`;
    // SkySplatV2
    document.getElementById(sceneId + '_SkySplatV2').style.clipPath = `inset(0 ${100 - s3}% 0 0)`;
  }
</script>
</head>
<body>

<!-- Intro 保留 -->
<section class="section is-light">
  <div class="container is-max-desktop">
    <h2 class="title is-3 has-text-centered">SkySplat++ Four-Method Comparison</h2>
    <p class="has-text-centered">Compare MVSplat, HiSplat, SkySplat, and SkySplatV2 on different AOIs.</p>
  </div>
</section>

<section class="section is-light">
  <div class="container is-max-desktop">

    <!-- ================= AOI: JAX072 ================= -->
    <h3 class="title is-5 has-text-centered">AOI: JAX072</h3>
    <div class="compare-column">
      <div class="image-compare-container">
        <img src="static/images/MVSplat_JAX_Tile_072-image.png" class="img-layer" id="JAX072_MVSplat">
        <img src="static/images/HiSplat_JAX_Tile_072-image.png" class="img-layer" id="JAX072_HiSplat">
        <img src="static/images/SkySplat_JAX_Tile_072-image.png" class="img-layer" id="JAX072_SkySplat">
        <img src="static/images/SkySplatV2_JAX_Tile_072-image.png" class="img-layer" id="JAX072_SkySplatV2">
      </div>
      <div class="slider-container">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="JAX072_slider1" oninput="slideFourLayer('JAX072')">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="JAX072_slider2" oninput="slideFourLayer('JAX072')">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="JAX072_slider3" oninput="slideFourLayer('JAX072')">
      </div>
    </div>

    <!-- ================= AOI: JAX079 ================= -->
    <h3 class="title is-5 has-text-centered">AOI: JAX079</h3>
    <div class="compare-column">
      <div class="image-compare-container">
        <img src="static/images/MVSplat_JAX_Tile_079-image.png" class="img-layer" id="JAX079_MVSplat">
        <img src="static/images/HiSplat_JAX_Tile_079-image.png" class="img-layer" id="JAX079_HiSplat">
        <img src="static/images/SkySplat_JAX_Tile_079-image.png" class="img-layer" id="JAX079_SkySplat">
        <img src="static/images/SkySplatV2_JAX_Tile_079-image.png" class="img-layer" id="JAX079_SkySplatV2">
      </div>
      <div class="slider-container">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="JAX079_slider1" oninput="slideFourLayer('JAX079')">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="JAX079_slider2" oninput="slideFourLayer('JAX079')">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="JAX079_slider3" oninput="slideFourLayer('JAX079')">
      </div>
    </div>

    <!-- ================= AOI: OMA212 ================= -->
    <h3 class="title is-5 has-text-centered">AOI: OMA212</h3>
    <div class="compare-column">
      <div class="image-compare-container">
        <img src="static/images/MVSplat_OMA_Tile_212-image.png" class="img-layer" id="OMA212_MVSplat">
        <img src="static/images/HiSplat_OMA_Tile_212-image.png" class="img-layer" id="OMA212_HiSplat">
        <img src="static/images/SkySplat_OMA_Tile_212-image.png" class="img-layer" id="OMA212_SkySplat">
        <img src="static/images/SkySplatV2_OMA_Tile_212-image.png" class="img-layer" id="OMA212_SkySplatV2">
      </div>
      <div class="slider-container">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="OMA212_slider1" oninput="slideFourLayer('OMA212')">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="OMA212_slider2" oninput="slideFourLayer('OMA212')">
        <input type="range" min="0" max="100" value="50" class="slider"
               id="OMA212_slider3" oninput="slideFourLayer('OMA212')">
      </div>
    </div>

  </div>
</section>

</body>
</html>
