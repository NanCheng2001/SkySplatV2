<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkySplat++: Four-Method Comparison</title>

<!-- Styles -->
<link rel="stylesheet" href="static/css/bulma.min.css">
<style>
  .compare-column {
    position: relative;
    text-align: center;
    margin-bottom: 2rem;
  }
  .image-compare-container {
    position: relative;
    width: 100%;
    overflow: hidden;
  }
  .image-compare-container img {
    width: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  .img-front {
    z-index: 2;
    clip-path: inset(0 50% 0 0); /* 默认显示左半边 */
  }
  .slider-container {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .slider {
    width: 200px;
  }
</style>

<script>
  function slideCompare(value, imgId) {
    const img = document.getElementById(imgId);
    img.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
  }
</script>

</head>
<body>
<section class="section is-light">
  <div class="container is-max-desktop">
    <h2 class="title is-3 has-text-centered">Four-Method Comparison</h2>

    <!-- ================= AOI: JAX072 ================= -->
    <h3 class="title is-5 has-text-centered">AOI: JAX072</h3>
    <div class="columns is-gapless is-variable is-2">

      <div class="column compare-column">
        <p class="has-text-centered method-title">MVSplat</p>
        <div class="image-compare-container">
          <img src="static/images/MVSplat_JAX_Tile_072-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">HiSplat</p>
        <div class="image-compare-container">
          <img src="static/images/HiSplat_JAX_Tile_072-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">SkySplat</p>
        <div class="image-compare-container">
          <img src="static/images/SkySplat_JAX_Tile_072-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">SkySplatV2 (Ours)</p>
        <div class="image-compare-container">
          <img src="static/images/SkySplatV2_JAX_Tile_072-image.png"
               class="img-front"
               id="jax072_front">
        </div>
        <div class="slider-container">
          <input type="range" min="0" max="100" value="50" class="slider"
                 oninput="slideCompare(this.value, 'jax072_front')">
        </div>
      </div>

    </div>

    <!-- ================= AOI: JAX079 ================= -->
    <h3 class="title is-5 has-text-centered">AOI: JAX079</h3>
    <div class="columns is-gapless is-variable is-2">

      <div class="column compare-column">
        <p class="has-text-centered method-title">MVSplat</p>
        <div class="image-compare-container">
          <img src="static/images/MVSplat_JAX_Tile_079-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">HiSplat</p>
        <div class="image-compare-container">
          <img src="static/images/HiSplat_JAX_Tile_079-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">SkySplat</p>
        <div class="image-compare-container">
          <img src="static/images/SkySplat_JAX_Tile_079-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">SkySplatV2 (Ours)</p>
        <div class="image-compare-container">
          <img src="static/images/SkySplatV2_JAX_Tile_079-image.png"
               class="img-front"
               id="jax079_front">
        </div>
        <div class="slider-container">
          <input type="range" min="0" max="100" value="50" class="slider"
                 oninput="slideCompare(this.value, 'jax079_front')">
        </div>
      </div>

    </div>

    <!-- ================= AOI: OMA212 ================= -->
    <h3 class="title is-5 has-text-centered">AOI: OMA212</h3>
    <div class="columns is-gapless is-variable is-2">

      <div class="column compare-column">
        <p class="has-text-centered method-title">MVSplat</p>
        <div class="image-compare-container">
          <img src="static/images/MVSplat_OMA_Tile_212-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">HiSplat</p>
        <div class="image-compare-container">
          <img src="static/images/HiSplat_OMA_Tile_212-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">SkySplat</p>
        <div class="image-compare-container">
          <img src="static/images/SkySplat_OMA_Tile_212-image.png">
        </div>
      </div>

      <div class="column compare-column">
        <p class="has-text-centered method-title">SkySplatV2 (Ours)</p>
        <div class="image-compare-container">
          <img src="static/images/SkySplatV2_OMA_Tile_212-image.png"
               class="img-front"
               id="oma212_front">
        </div>
        <div class="slider-container">
          <input type="range" min="0" max="100" value="50" class="slider"
                 oninput="slideCompare(this.value, 'oma212_front')">
        </div>
      </div>

    </div>

  </div>
</section>
</body>
</html>
